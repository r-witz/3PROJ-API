  /admin/users/{userId}/ban:
    delete:
      description: Remove a ban from a user
      parameters:
      - description: User ID to unban
        format: uuid
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User unbanned successfully
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "409":
          description: User is not banned
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Unban a user
      tags:
      - admin
    post:
      description: Ban a user by their ID. Admins cannot ban other admins or super-admins.
        A "user.banned" WebSocket event is sent to all users who have a conversation
        with the banned user.
      parameters:
      - description: User ID to ban
        format: uuid
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: User banned successfully
        "400":
          description: Invalid user ID or cannot ban self
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Cannot ban admin or insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
