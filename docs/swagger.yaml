info:
  contact:
    email: support@duskforge.io
    name: API Support
    url: https://github.com/duskforge/api
  description: A movie collection and review API powered by TMDB
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Duskforge API
  version: "1.0"
paths:
  /actors/{id}:
    get:
      consumes:
      - application/json
      description: Get detailed information about an actor by their TMDB ID
      parameters:
      - description: Actor ID
        in: path
        name: id
        required: true
        type: integer
      - description: Language code (e.g., en, fr)
        in: header
        name: Accept-Language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Actor details
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "400":
          description: Invalid actor ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Actor not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "502":
          description: External service error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      summary: Get actor details
      tags:
      - actors
  /actors/{id}/movies:
    get:
      consumes:
      - application/json
      description: Get the filmography (movies) of an actor by their TMDB ID. Includes
        both cast and crew credits.
      parameters:
      - description: Actor ID
        in: path
        name: id
        required: true
        type: integer
      - default: 0
        description: Number of items to skip
        in: query
        name: offset
        type: integer
      - default: 20
        description: Number of items to return (max 20)
        in: query
        name: limit
        type: integer
      - default: -release_date
        description: Sort field with direction prefix (+asc, -desc)
        enum:
        - +release_date
        - -release_date
        - +popularity
        - -popularity
        - +rating
        - -rating
        - +name
        - -name
        in: query
        name: sort
        type: string
      - description: Language code (e.g., en, fr)
        in: header
        name: Accept-Language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Actor filmography
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.PaginatedResponse'
        "400":
          description: Invalid actor ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Actor not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "502":
          description: External service error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      summary: Get actor filmography
      tags:
      - actors
  /actors/search:
    get:
      consumes:
      - application/json
      description: Search for actors by name. Use this endpoint when users are looking
        for a specific actor/person.
      parameters:
      - description: Search query
        in: query
        name: query
        required: true
        type: string
      - default: 0
        description: Number of items to skip
        in: query
        name: offset
        type: integer
      - default: 20
        description: Number of items to return (max 20)
        in: query
        name: limit
        type: integer
      - description: Language code (e.g., en, fr)
        in: header
        name: Accept-Language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Search results
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.PaginatedResponse'
        "400":
          description: Query parameter is required
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "502":
          description: External service error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      summary: Search actors by name
      tags:
      - actors
  /admin/comments/{commentId}:
    delete:
      description: Delete any comment by its ID, regardless of ownership
      parameters:
      - description: Comment ID to delete
        format: uuid
        in: path
        name: commentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Comment deleted successfully
        "400":
          description: Invalid comment ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Comment not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Delete a comment (admin)
      tags:
      - admin
  /admin/reports:
    get:
      description: List reports with optional filters. Filter by status and/or target
        user ID.
      parameters:
      - description: Filter by status
        enum:
        - pending
        - resolved
        - dismissed
        in: query
        name: status
        type: string
      - description: Filter by target user ID
        format: uuid
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of reports
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_adapters_handlers.ReportResponse'
                  type: array
              type: object
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: List reports
      tags:
      - admin
  /admin/reports/{reportId}:
    delete:
      description: Permanently delete a report
      parameters:
      - description: Report ID
        format: uuid
        in: path
        name: reportId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Report deleted successfully
        "400":
          description: Invalid report ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Report not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Delete a report
      tags:
      - admin
    get:
      description: Get a single report by its ID
      parameters:
      - description: Report ID
        format: uuid
        in: path
        name: reportId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Report details
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.ReportResponse'
              type: object
        "400":
          description: Invalid report ID
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Report not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Get a report
      tags:
      - admin
    patch:
      consumes:
      - application/json
      description: Update a report's status to resolved or dismissed
      parameters:
      - description: Report ID
        format: uuid
        in: path
        name: reportId
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handlers.ResolveReportRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Report updated
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.ReportResponse'
              type: object
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "403":
          description: Insufficient permissions
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: Report not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "409":
          description: Report already resolved
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Resolve or dismiss a report
      tags:
      - admin
  /admin/reviews/{reviewId}:
    delete:
      description: Delete any review by its ID, regardless of ownership
      parameters:
      - description: Review ID to delete
        format: uuid
        in: path
        name: reviewId
        required: true
        type: string
