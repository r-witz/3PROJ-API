          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Delete current user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get the profile of the currently authenticated user. Follower and
        following counts always exclude banned users.
      produces:
      - application/json
      responses:
        "200":
          description: User profile
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Update the profile of the currently authenticated user
      parameters:
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handlers.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user profile
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.UserResponse'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "409":
          description: Username already taken
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - users
  /users/me/avatar:
    delete:
      description: Remove the avatar image of the current user
      produces:
      - application/json
      responses:
        "200":
          description: Updated user profile without avatar
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Delete avatar
      tags:
      - users
    put:
      consumes:
      - multipart/form-data
      description: Upload a new avatar image for the current user. Replaces existing
        avatar if one exists. Accepts JPEG, PNG, GIF, and WebP (max 5MB).
      parameters:
      - description: Avatar image file
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Updated user profile with new avatar
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_adapters_handlers.UserResponse'
              type: object
        "400":
          description: Invalid file or file too large
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Upload or update avatar
      tags:
      - users
  /users/me/blocked:
    get:
      description: Get the list of users blocked by the authenticated user
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 20
        description: Limit for pagination (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of blocked users
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_adapters_handlers.BlockedUserResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Get blocked users
      tags:
      - blocks
  /users/me/export:
    get:
      description: Export all personal data associated with the authenticated user
        as a JSON file download. Data is generated on-the-fly and not stored on disk.
      produces:
      - application/json
      responses:
        "200":
          description: JSON file containing all user data
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Export user data (GDPR)
      tags:
      - export
  /users/me/password:
    put:
      consumes:
      - application/json
      description: Change the password of the currently authenticated user. OAuth-only
        users can omit current_password to set a password for the first time.
      parameters:
      - description: New password (current_password optional for OAuth-only accounts)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_handlers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed successfully
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "400":
          description: Invalid request body or password too short/long
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "401":
          description: Unauthorized or incorrect current password
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Change or set password
      tags:
      - users
  /users/search:
    get:
      consumes:
      - application/json
      description: Search and browse users by username with sorting and pagination.
        Regular users only see non-admin, non-banned accounts. Admins and super-admins
        see all accounts with additional details. If query is omitted, returns all
        visible users.
      parameters:
      - description: Search query (username)
        in: query
        name: query
        type: string
      - default: 0
        description: Number of items to skip
        in: query
        name: offset
        type: integer
      - default: 20
        description: Number of items to return (max 100)
        in: query
        name: limit
        type: integer
      - description: Sort field with direction prefix (+asc, -desc)
        enum:
        - +username
        - -username
        - +created_at
        - -created_at
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Search results (admin view)
          schema:
            allOf:
            - $ref: '#/definitions/duskforge-api_internal_adapters_response.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_adapters_handlers.AdminSearchUserResponse'
                  type: array
              type: object
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Search users
      tags:
      - users
  /ws:
    get:
      description: 'Establishes a WebSocket connection for real-time notifications.
        The connection is read-only — actions are performed via REST endpoints. Events
        pushed: message.new, message.updated, message.deleted, reaction.added, reaction.removed,
        conversation.read, conversation.closed, conversation.reopened, messaging.blocked,
        messaging.unblocked, import.progress, user.banned, notification.new. The import.progress
        event is sent during a Letterboxd import with fields: status (processing|completed|failed),
        phase (resolving|importing|done), resolved, total, and result (when completed).
        The conversation.closed and conversation.reopened events are sent when a user
        closes or reopens a conversation, with payload: { other_user_id: string }.'
      parameters:
      - description: JWT access token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established
        "401":
          description: Missing or invalid token
          schema:
            type: string
      summary: WebSocket connection
      tags:
      - websocket
securityDefinitions:
  BearerAuth:
    description: 'Enter your bearer token in the format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
