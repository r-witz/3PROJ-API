          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/duskforge-api_internal_adapters_response.Response'
      security:
      - BearerAuth: []
      summary: Ban a user
      tags:
      - admin
  /admin/users/{userId}/role:
