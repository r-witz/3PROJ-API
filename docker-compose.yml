services:
  redis:
    image: redis:7-alpine
    container_name: duskforge-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://duskforge:password@db:5432/duskforge?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - PORT=8080
      - GIN_MODE=release
      - BREVO_API_KEY=${BREVO_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://duskforge:password@db:5432/duskforge?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: duskforge
      POSTGRES_PASSWORD: password
      POSTGRES_DB: duskforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duskforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
