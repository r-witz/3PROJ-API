services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://duskforge:password@db:5432/duskforge?sslmode=disable
      - PORT=8080
      - GIN_MODE=release
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://duskforge:password@db:5432/duskforge?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: duskforge
      POSTGRES_PASSWORD: password
      POSTGRES_DB: duskforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duskforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
